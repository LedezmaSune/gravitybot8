version: '3.8'

services:
  botmare:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: botmare-unified
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persistencia de sesiones y datos
      - ./auth_info_baileys:/app/auth_info_baileys
      - ./data:/app/data
      - ./backups:/app/backups
    env_file:
      - .env
    environment:
      - PORT=8000
      - NODE_ENV=production
